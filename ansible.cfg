[defaults]
# Default Python interpreter for remote connections
ansible_python_interpreter = /usr/bin/python3
# Suppress warnings when the interpreter is auto-detected
interpreter_python = auto_silent

# Path to install and search for roles
roles_path = ./ansible_galaxy_roles

# Inventory file location (no need to pass -i)
inventory = ./hosts

# Disable SSH host key checking (use with caution)
host_key_checking = False

[ssh_connection]
# Uncomment to enable pipelining (can reduce latency)
# pipelining = True

# Example custom control_path for SSH multiplexing
# control_path = /tmp/ansible-ssh-%h-%p-%r
